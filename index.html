<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enemy Shooter — Enhanced</title>
<script>
  // Disable browser back/forward navigation (mouse thumb buttons & keyboard)
  history.pushState(null, null, location.href);
  window.addEventListener('popstate', () => history.pushState(null, null, location.href));
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #060b18;
    display: flex; justify-content: center; align-items: center;
    height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }

  canvas {
    display: block; image-rendering: pixelated;
    border-radius: 10px;
    box-shadow: 0 0 0 1px rgba(0,200,255,0.15),
                0 0 40px rgba(0,150,255,0.12),
                0 0 80px rgba(0,80,200,0.08);
  }

  /* ── OVERLAY ── */
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    background: radial-gradient(ellipse at center, rgba(0,12,35,0.97) 0%, rgba(0,0,0,0.99) 100%);
    color: white; z-index: 10;
    transition: opacity 0.5s;
  }
  #overlay::before {
    content: '';
    position: absolute; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,180,255,0.07) 0%, transparent 70%);
    animation: pulse-ring 3.5s ease-in-out infinite; pointer-events: none;
  }
  @keyframes pulse-ring {
    0%, 100% { transform: scale(1);    opacity: 0.5; }
    50%       { transform: scale(1.22); opacity: 1;   }
  }

  #overlay h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(36px, 6vw, 68px);
    font-weight: 900; letter-spacing: 5px; text-align: center;
    background: linear-gradient(135deg, #00d4ff 0%, #00ff88 55%, #ffcc00 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 28px rgba(0,212,255,0.55));
    animation: float-title 4s ease-in-out infinite;
    margin-bottom: 6px;
  }
  @keyframes float-title {
    0%, 100% { transform: translateY(0);  }
    50%       { transform: translateY(-7px); }
  }

  .tag {
    font-size: 11px; color: #4af; letter-spacing: 10px;
    text-transform: uppercase; margin-bottom: 26px;
    font-family: 'Orbitron', sans-serif;
  }

  .inst-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 9px 28px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
    border-radius: 14px; backdrop-filter: blur(12px);
    padding: 16px 32px; margin-bottom: 18px;
  }
  .inst-row { display: flex; align-items: center; gap: 9px; color: #bbb; font-size: 13px; }
  .kbd {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 5px; padding: 2px 9px; font-weight: 700; color: #fff;
    font-size: 11px; font-family: 'Orbitron', sans-serif; white-space: nowrap;
  }

  #overlay p {
    font-size: 14px; margin: 0 0 22px; color: #777; text-align: center;
  }
  #overlay p b { color: #ffcc00; font-weight: 700; }

  #overlay button {
    margin-top: 0; padding: 14px 54px; font-size: 17px; font-weight: 800;
    letter-spacing: 4px; text-transform: uppercase; cursor: pointer; border: none;
    border-radius: 50px; position: relative; overflow: hidden;
    background: linear-gradient(135deg, #00d4ff, #0055ff);
    color: #fff; box-shadow: 0 0 35px rgba(0,180,255,0.45);
    transition: transform 0.2s, box-shadow 0.2s;
    font-family: 'Orbitron', sans-serif;
  }
  #overlay button::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: shimmer 2.2s infinite;
  }
  @keyframes shimmer { to { left: 100%; } }
  #overlay button:hover { transform: scale(1.07); box-shadow: 0 0 60px rgba(0,180,255,0.8); }

  /* ── DAMAGE FLASH ── */
  #dmg-flash {
    position: fixed; inset: 0; z-index: 9; pointer-events: none;
    background: rgba(255, 0, 0, 0); transition: background 0.06s;
  }
  #dmg-flash.hit { background: rgba(255, 0, 0, 0.25); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dmg-flash"></div>
<div id="overlay">
  <h1>ENEMY SHOOTER</h1>
  <div class="tag">2D Enhanced Edition</div>
  <div class="inst-grid">
    <div class="inst-row"><span class="kbd">WASD</span> Move</div>
    <div class="inst-row"><span class="kbd">↑↓←→</span> Move</div>
    <div class="inst-row">⭐ Collect <b style="color:#fff">&nbsp;gems</b></div>
    <div class="inst-row">💀 Dodge <b style="color:#fff">&nbsp;fireballs</b></div>
  </div>
  <p>Collect <b>10 gems</b> to WIN &nbsp;·&nbsp; You have <b>5 lives</b></p>
  <button onclick="startGame()">▶ START GAME</button>
</div>

<script>
// ════════════════════════════════════════════════
//  SETUP
// ════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width  = 800;
const H = canvas.height = 600;

const TILE   = 48;           // tile size in pixels
const MAP_W  = 30;           // tiles wide
const MAP_H  = 24;           // tiles tall
const WORLD_W = MAP_W * TILE;
const WORLD_H = MAP_H * TILE;

// ── Tile types ──
const GRASS = 0, DIRT = 1, STONE = 2, WATER = 3;
const TILE_COLORS = ['#4a7c3f','#8b6914','#888','#1a6699'];
const TILE_DARK   = ['#3a6030','#7a5a10','#666','#155588'];

// ── Generate simple tile map ──
const map = [];
for (let r = 0; r < MAP_H; r++) {
  map[r] = [];
  for (let c = 0; c < MAP_W; c++) {
    const n = Math.random();
    if (n < 0.65)      map[r][c] = GRASS;
    else if (n < 0.78) map[r][c] = DIRT;
    else if (n < 0.88) map[r][c] = STONE;
    else               map[r][c] = WATER;
  }
}

// ── Camera ──
const cam = { x: 0, y: 0 };

// ════════════════════════════════════════════════
//  ENTITIES
// ════════════════════════════════════════════════
const player = {
  x: WORLD_W/2, y: WORLD_H/2,
  w: 28, h: 28,
  speed: 3, angle: 0,
  invincible: 0, alive: true,
  // animation
  walkFrame: 0, walkTimer: 0, moving: false
};

const enemy = {
  x: WORLD_W * 0.8, y: WORLD_H * 0.2,
  w: 30, h: 30,
  angle: 0,
  shootTimer: 0, shootInterval: 110,
  alive: true
};

let projectiles = [];
let collectibles = [];
let particles    = [];
let spawnTimer   = 0;
let score        = 0;
let lives        = 5;
const SCORE_WIN  = 10;
let gameRunning  = false;
let animId;

// ════════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════════
const keys = {};
addEventListener('keydown', e => { keys[e.key] = true;  e.preventDefault(); });
addEventListener('keyup',   e => { keys[e.key] = false; });

// ════════════════════════════════════════════════
//  START
// ════════════════════════════════════════════════
function startGame() {
  score = 0; lives = 5;
  projectiles = []; collectibles = []; particles = [];
  player.x = WORLD_W/2; player.y = WORLD_H/2;
  player.invincible = 0; player.alive = true; player.angle = 0;
  enemy.x = WORLD_W * 0.8; enemy.y = WORLD_H * 0.2; enemy.alive = true;
  spawnTimer = 0;
  document.getElementById('overlay').style.display = 'none';
  gameRunning = true;
  for (let i = 0; i < 4; i++) spawnCollectible();
  cancelAnimationFrame(animId);
  loop();
}

// ════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════
function loop() {
  if (!gameRunning) return;
  update();
  render();
  animId = requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════════
function update() {
  // ── Player movement ──
  let dx = 0, dy = 0;
  if (keys['a'] || keys['ArrowLeft'])  dx -= 1;
  if (keys['d'] || keys['ArrowRight']) dx += 1;
  if (keys['w'] || keys['ArrowUp'])    dy -= 1;
  if (keys['s'] || keys['ArrowDown'])  dy += 1;

  player.moving = dx !== 0 || dy !== 0;

  if (player.moving) {
    // normalize diagonal
    const len = Math.sqrt(dx*dx + dy*dy);
    dx /= len; dy /= len;
    player.x += dx * player.speed;
    player.y += dy * player.speed;
    player.angle = Math.atan2(dy, dx);
    // walk animation
    player.walkTimer++;
    if (player.walkTimer > 8) { player.walkTimer = 0; player.walkFrame = (player.walkFrame+1)%4; }
  }

  // Clamp to world
  player.x = Math.max(16, Math.min(WORLD_W - 16, player.x));
  player.y = Math.max(16, Math.min(WORLD_H - 16, player.y));

  // Invincibility
  if (player.invincible > 0) player.invincible--;

  // ── Camera follow player (centered) ──
  cam.x = player.x - W/2;
  cam.y = player.y - H/2;
  cam.x = Math.max(0, Math.min(WORLD_W - W, cam.x));
  cam.y = Math.max(0, Math.min(WORLD_H - H, cam.y));

  // ── Enemy faces player ──
  const edx = player.x - enemy.x;
  const edy = player.y - enemy.y;
  enemy.angle = Math.atan2(edy, edx);

  // ── Enemy shoots ──
  enemy.shootTimer++;
  if (enemy.shootTimer >= enemy.shootInterval) {
    enemy.shootTimer = 0;
    const dist = Math.sqrt(edx*edx + edy*edy);
    if (dist > 0) {
      projectiles.push({
        x: enemy.x + Math.cos(enemy.angle)*20,
        y: enemy.y + Math.sin(enemy.angle)*20,
        vx: (edx/dist)*4.5, vy: (edy/dist)*4.5,
        r: 7, life: 260
      });
    }
  }

  // ── Move projectiles ──
  for (let i = projectiles.length-1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    if (p.life <= 0 || p.x<0 || p.x>WORLD_W || p.y<0 || p.y>WORLD_H) {
      projectiles.splice(i,1); continue;
    }
    if (player.invincible === 0) {
      if (Math.abs(p.x-player.x)<18 && Math.abs(p.y-player.y)<18) {
        projectiles.splice(i,1);
        player.invincible = 90;
        lives--;
        spawnParticles(player.x, player.y, '#ff4444', 14);
        // Damage flash
        const flash = document.getElementById('dmg-flash');
        if (flash) { flash.classList.add('hit'); setTimeout(() => flash.classList.remove('hit'), 80); }
        if (lives <= 0) { endGame(false); return; }
      }
    }
  }

  // ── Spawn collectibles ──
  spawnTimer++;
  if (spawnTimer >= 180) { spawnTimer = 0; spawnCollectible(); }

  // ── Collect gems ──
  for (let i = collectibles.length-1; i >= 0; i--) {
    const c = collectibles[i];
    c.pulse += 0.08;
    if (Math.abs(c.x-player.x)<22 && Math.abs(c.y-player.y)<22) {
      collectibles.splice(i,1);
      score++;
      spawnParticles(c.x, c.y, '#ffe066', 16);
      if (score >= SCORE_WIN) { endGame(true); return; }
    }
  }

  // ── Particles ──
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.93; p.vy *= 0.93;
    p.life--;
    if (p.life<=0) particles.splice(i,1);
  }
}

// ════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════
function render() {
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(-cam.x, -cam.y);

  // ── Draw tiles ──
  const startCol = Math.max(0, Math.floor(cam.x/TILE));
  const endCol   = Math.min(MAP_W, Math.ceil((cam.x+W)/TILE));
  const startRow = Math.max(0, Math.floor(cam.y/TILE));
  const endRow   = Math.min(MAP_H, Math.ceil((cam.y+H)/TILE));

  for (let r = startRow; r < endRow; r++) {
    for (let c = startCol; c < endCol; c++) {
      const t = map[r][c];
      const tx = c*TILE, ty = r*TILE;
      ctx.fillStyle = TILE_COLORS[t];
      ctx.fillRect(tx, ty, TILE, TILE);
      // tile border
      ctx.fillStyle = TILE_DARK[t];
      ctx.fillRect(tx, ty, TILE, 1);
      ctx.fillRect(tx, ty, 1, TILE);
      // water waves
      if (t === WATER) {
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(tx+6, ty+14, 18, 3);
        ctx.fillRect(tx+22, ty+28, 14, 3);
      }
      // stone detail
      if (t === STONE) {
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(tx+8, ty+8, 14, 14);
      }
    }
  }

  // ── Particles ──
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // ── Collectibles ──
  collectibles.forEach(c => {
    const bob = Math.sin(c.pulse) * 3;
    const grd = ctx.createRadialGradient(c.x, c.y+bob, 2, c.x, c.y+bob, 14);
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(0.4, '#ffe066');
    grd.addColorStop(1, '#ff9900');
    // glow
    ctx.shadowColor = '#ffe066';
    ctx.shadowBlur  = 18;
    ctx.fillStyle   = grd;
    ctx.beginPath();
    // star shape
    for (let i=0; i<5; i++) {
      const a  = (i*4*Math.PI/5) - Math.PI/2 + c.pulse*0.3;
      const a2 = ((i*4+2)*Math.PI/5) - Math.PI/2 + c.pulse*0.3;
      if (i===0) ctx.moveTo(c.x + Math.cos(a)*13, c.y+bob + Math.sin(a)*13);
      else        ctx.lineTo(c.x + Math.cos(a)*13, c.y+bob + Math.sin(a)*13);
      ctx.lineTo(c.x + Math.cos(a2)*6, c.y+bob + Math.sin(a2)*6);
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // ── Projectiles ──
  projectiles.forEach(p => {
    ctx.shadowColor = '#ff2200';
    ctx.shadowBlur  = 14;
    // trail
    ctx.fillStyle = 'rgba(255,100,0,0.3)';
    ctx.beginPath();
    ctx.arc(p.x - p.vx*3, p.y - p.vy*3, p.r*0.7, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ff4400';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r*0.45, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // ── Draw Enemy ──
  drawCharacter(enemy.x, enemy.y, enemy.angle, false, 0, false);

  // ── Draw Player ──
  const flicker = player.invincible > 0 && Math.floor(player.invincible/7)%2===0;
  if (!flicker) {
    drawCharacter(player.x, player.y, player.angle, true, player.walkFrame, player.moving);
  }

  ctx.restore();

  // ── HUD (screen space, not world space) ──
  drawHUD();
}

// ════════════════════════════════════════════════
//  DRAW CHARACTER (top-down RPG style)
// ════════════════════════════════════════════════
function drawCharacter(x, y, angle, isPlayer, walkFrame, moving) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle + Math.PI/2);

  const shadow_color = isPlayer ? '#00aaff' : '#ff2200';

  // Shadow on ground
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath();
  ctx.ellipse(0, 8, 13, 6, 0, 0, Math.PI*2);
  ctx.fill();

  if (isPlayer) {
    // ── PLAYER CHARACTER ──

    // Legs (walking animation)
    const legSwing = moving ? Math.sin(walkFrame * Math.PI/2) * 6 : 0;
    // Left leg
    ctx.fillStyle = '#1a4fa8';
    ctx.beginPath();
    ctx.ellipse(-5, 6 + legSwing, 4, 6, 0, 0, Math.PI*2);
    ctx.fill();
    // Right leg
    ctx.fillStyle = '#1a4fa8';
    ctx.beginPath();
    ctx.ellipse(5, 6 - legSwing, 4, 6, 0, 0, Math.PI*2);
    ctx.fill();

    // Body
    ctx.fillStyle = '#2266cc';
    ctx.shadowColor = '#00aaff';
    ctx.shadowBlur  = 12;
    ctx.beginPath();
    ctx.roundRect(-9, -8, 18, 16, 4);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Arms
    const armSwing = moving ? Math.sin(walkFrame * Math.PI/2) * 5 : 0;
    ctx.fillStyle = '#2266cc';
    ctx.beginPath();
    ctx.ellipse(-12, -2 + armSwing, 4, 5, -0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(12, -2 - armSwing, 4, 5, 0.3, 0, Math.PI*2);
    ctx.fill();

    // Head
    ctx.fillStyle = '#f5c58a';
    ctx.shadowColor = '#00aaff';
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.arc(0, -14, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Hair
    ctx.fillStyle = '#5c3210';
    ctx.beginPath();
    ctx.arc(0, -20, 9, Math.PI, 0);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(-4, -14, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 4, -14, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-3.5, -14.5, 0.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 4.5, -14.5, 0.8, 0, Math.PI*2); ctx.fill();

    // Name tag
    ctx.rotate(-(angle + Math.PI/2));
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(-22, -32, 44, 14);
    ctx.fillStyle = '#00ffcc';
    ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('PLAYER', 0, -21);

  } else {
    // ── ENEMY CHARACTER ──

    // Legs
    const legSwing = Math.sin(Date.now()*0.008) * 5;
    ctx.fillStyle = '#8b0000';
    ctx.beginPath();
    ctx.ellipse(-5, 7 + legSwing, 4, 6, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#8b0000';
    ctx.beginPath();
    ctx.ellipse(5, 7 - legSwing, 4, 6, 0, 0, Math.PI*2);
    ctx.fill();

    // Body
    ctx.fillStyle = '#cc2222';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur  = 14;
    ctx.beginPath();
    ctx.roundRect(-10, -9, 20, 17, 4);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Spikes on body
    ctx.fillStyle = '#ff6600';
    for (let s = -1; s <= 1; s += 2) {
      ctx.beginPath();
      ctx.moveTo(s*10, -4);
      ctx.lineTo(s*16, -8);
      ctx.lineTo(s*10, 2);
      ctx.closePath();
      ctx.fill();
    }

    // Arms
    ctx.fillStyle = '#cc2222';
    ctx.beginPath();
    ctx.ellipse(-13, -3, 4, 6, -0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(13, -3, 4, 6, 0.3, 0, Math.PI*2);
    ctx.fill();

    // Head
    ctx.fillStyle = '#cc2222';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur  = 10;
    ctx.beginPath();
    ctx.arc(0, -15, 11, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Horns
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.moveTo(-7, -22); ctx.lineTo(-4, -30); ctx.lineTo(-1, -22);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(1, -22); ctx.lineTo(4, -30); ctx.lineTo(7, -22);
    ctx.closePath(); ctx.fill();

    // Eyes (glowing)
    ctx.fillStyle = '#ff0';
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(-4, -15, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 4, -15, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(-4, -15, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 4, -15, 1.5, 0, Math.PI*2); ctx.fill();

    // Label
    ctx.rotate(-(angle + Math.PI/2));
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(-22, -34, 44, 14);
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('ENEMY', 0, -23);
  }

  ctx.restore();
}

// ════════════════════════════════════════════════
//  HUD
// ════════════════════════════════════════════════
function drawHUD() {
  // Background bar
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, 56);

  // Score
  ctx.fillStyle = '#ffe066';
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(`⭐ Score: ${score} / ${SCORE_WIN}`, 16, 36);

  // Lives hearts
  ctx.font = '22px Arial';
  ctx.textAlign = 'left';
  let hearts = '';
  for (let i = 0; i < lives; i++) hearts += '❤️';
  for (let i = lives; i < 5; i++) hearts += '🖤';
  ctx.fillText(hearts, 260, 36);

  // Progress bar
  const bx = W-220, by = 14, bw = 200, bh = 20;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(bx, by, bw, bh);
  const prog = score / SCORE_WIN;
  const grd = ctx.createLinearGradient(bx,0,bx+bw,0);
  grd.addColorStop(0,'#00ff88'); grd.addColorStop(1,'#00ccff');
  ctx.fillStyle = grd;
  ctx.fillRect(bx, by, bw*prog, bh);
  ctx.strokeStyle = '#ffffff44';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = '#fff';
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.round(prog*100)}%`, bx+bw/2, by+14);

  // Controls hint
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '12px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('Move: WASD / Arrow Keys', 16, H-10);
}

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
function spawnCollectible() {
  if (collectibles.length >= 6) return;
  const margin = 80;
  let x, y, tries = 0;
  do {
    x = margin + Math.random()*(WORLD_W-margin*2);
    y = margin + Math.random()*(WORLD_H-margin*2);
    tries++;
  } while (tries < 20 && Math.abs(x-player.x)<100 && Math.abs(y-player.y)<100);
  collectibles.push({ x, y, pulse: Math.random()*Math.PI*2 });
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2;
    const s = 1.5 + Math.random()*3;
    particles.push({
      x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      r: 2+Math.random()*3, color,
      life: 35+Math.random()*20, maxLife: 55
    });
  }
}

function endGame(won) {
  gameRunning = false;
  cancelAnimationFrame(animId);
  const ol = document.getElementById('overlay');
  ol.innerHTML = won
    ? `<h1 style="background:linear-gradient(135deg,#00ff88,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">🏆 YOU WIN!</h1>
       <div class="tag" style="color:#ffcc00">SCORE: ${score} / ${SCORE_WIN}</div>
       <p style="color:#777;margin-bottom:24px">You collected all gems and survived!</p>
       <button onclick="startGame()">▶ PLAY AGAIN</button>`
    : `<h1 style="background:linear-gradient(135deg,#ff4444,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">💀 GAME OVER</h1>
       <div class="tag" style="color:#ff6655">SCORE: ${score} / ${SCORE_WIN}</div>
       <p style="color:#777;margin-bottom:24px">The enemy defeated you. Try again!</p>
       <button onclick="startGame()">▶ TRY AGAIN</button>`;
  ol.style.display = 'flex';
}
</script>
