<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enemy Shooter 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:Arial,sans-serif; }
canvas { display:block; }
#hud {
  position:fixed; top:0; left:0; width:100%; padding:12px 20px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);
  color:#fff; display:flex; justify-content:space-between; align-items:center;
  z-index:10; pointer-events:none;
}
#hud .score { font-size:24px; font-weight:bold; color:#ffe066; text-shadow:0 0 10px #ff9900; }
#hud .lives { font-size:22px; }
#hud .bar-wrap { text-align:right; }
#hud .bar-bg { width:180px; height:16px; background:rgba(255,255,255,0.15); border-radius:8px; overflow:hidden; }
#hud .bar-fill { height:100%; background:linear-gradient(to right,#00ff88,#00ccff); border-radius:8px; transition:width 0.3s; }
#overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.88); display:flex; flex-direction:column;
  justify-content:center; align-items:center; z-index:20; color:#fff;
}
#overlay h1 { font-size:54px; margin-bottom:16px; }
#overlay p  { font-size:19px; margin:7px 0; color:#ccc; }
#overlay button {
  margin-top:30px; padding:14px 50px; font-size:22px; font-weight:bold;
  background:#00cc66; color:#000; border:none; border-radius:10px; cursor:pointer;
}
#overlay button:hover { background:#00ff88; }
#controls {
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.45); font-size:13px; z-index:10; pointer-events:none;
}
</style>
</head>
<body>
<div id="hud">
  <div class="score" id="scoreText">⭐ Score: 0 / 10</div>
  <div class="lives" id="livesText">❤️❤️❤️❤️❤️</div>
  <div class="bar-wrap">
    <div style="color:#aaa;font-size:12px;margin-bottom:3px;">Progress</div>
    <div class="bar-bg"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
  </div>
</div>
<div id="overlay">
  <h1 style="color:#00ff88">🎮 Enemy Shooter 3D</h1>
  <p><b>WASD / Arrow Keys</b> — Move</p>
  <p>Collect glowing <b style="color:#ffe066">★ gems</b> to score</p>
  <p>Dodge <b style="color:#ff4444">enemy fireballs!</b></p>
  <p style="margin-top:10px">Collect <b>10 gems</b> to WIN &nbsp;|&nbsp; <b>5 lives</b></p>
  <button onclick="startGame()">▶ Start Game</button>
</div>
<div id="controls">WASD / Arrow Keys — Move &nbsp;|&nbsp; Camera follows player (Third Person)</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); // sky blue
scene.fog        = new THREE.Fog(0x87ceeb, 30, 120);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════════
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5cc, 1.2);
sun.position.set(20, 40, 20);
sun.castShadow = true;
sun.shadow.mapSize.width  = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 1;
sun.shadow.camera.far  = 200;
sun.shadow.camera.left = -60;
sun.shadow.camera.right = 60;
sun.shadow.camera.top   = 60;
sun.shadow.camera.bottom = -60;
scene.add(sun);

const hemi = new THREE.HemisphereLight(0x87ceeb, 0x4a7c3f, 0.4);
scene.add(hemi);
</script>

<script>
// ═══════════════════════════════════════════
//  GROUND + WORLD
// ═══════════════════════════════════════════
function makeGround() {
  // Checkerboard ground
  const size = 80;
  const geo  = new THREE.PlaneGeometry(size, size, 20, 20);
  const canvas2 = document.createElement('canvas');
  canvas2.width = canvas2.height = 512;
  const c2 = canvas2.getContext('2d');
  for (let i = 0; i < 16; i++) {
    for (let j = 0; j < 16; j++) {
      c2.fillStyle = (i+j)%2===0 ? '#4a7c3f' : '#3a6030';
      c2.fillRect(i*32, j*32, 32, 32);
    }
  }
  const tex = new THREE.CanvasTexture(canvas2);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(4, 4);
  const mat  = new THREE.MeshLambertMaterial({ map: tex });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI/2;
  mesh.receiveShadow = true;
  scene.add(mesh);
}
makeGround();

// Trees decoration
function makeTree(x, z) {
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3, 0.4, 2, 6),
    new THREE.MeshLambertMaterial({ color: 0x8b5e3c })
  );
  trunk.position.set(x, 1, z);
  trunk.castShadow = true;
  scene.add(trunk);
  const leaves = new THREE.Mesh(
    new THREE.ConeGeometry(2, 3.5, 7),
    new THREE.MeshLambertMaterial({ color: 0x228b22 })
  );
  leaves.position.set(x, 3.5, z);
  leaves.castShadow = true;
  scene.add(leaves);
}
const treePos = [[-18,-18],[-20,5],[-15,18],[10,-22],[22,-10],[20,20],[18,8],[-8,22],[-22,12],[12,15]];
treePos.forEach(p => makeTree(p[0], p[1]));

// Rocks
function makeRock(x, z) {
  const rock = new THREE.Mesh(
    new THREE.DodecahedronGeometry(0.8 + Math.random()*0.5, 0),
    new THREE.MeshLambertMaterial({ color: 0x888888 })
  );
  rock.position.set(x, 0.5, z);
  rock.rotation.y = Math.random()*Math.PI;
  rock.castShadow = true;
  scene.add(rock);
}
[[-5,12],[8,-8],[-12,3],[15,-16],[3,18]].forEach(p => makeRock(p[0], p[1]));
</script>

<script>
// ═══════════════════════════════════════════
//  PLAYER (3rd person character)
// ═══════════════════════════════════════════
const playerGroup = new THREE.Group();
scene.add(playerGroup);

// Body
const bodyMesh = new THREE.Mesh(
  new THREE.BoxGeometry(0.8, 1.0, 0.5),
  new THREE.MeshLambertMaterial({ color: 0x2266cc })
);
bodyMesh.position.y = 1.3;
bodyMesh.castShadow = true;
playerGroup.add(bodyMesh);

// Head

  new THREE.BoxGeometry(0.65, 0.65, 0.65),
  new THREE.MeshLambertMaterial({ color: 0xf5c58a })
);
headMesh.position.y = 2.15;
headMesh.castShadow = true;
playerGroup.add(headMesh);

// Hair
const hairMesh = new THREE.Mesh(
  new THREE.BoxGeometry(0.68, 0.25, 0.68),
  new THREE.MeshLambertMaterial({ color: 0x5c3210 })
);
hairMesh.position.y = 2.55;
playerGroup.add(hairMesh);

// Left arm

  new THREE.BoxGeometry(0.25, 0.8, 0.25),
  new THREE.MeshLambertMaterial({ color: 0x2266cc })
);
lArm.position.set(-0.55, 1.25, 0);
lArm.castShadow = true;
playerGroup.add(lArm);

// Right arm
const rArm = new THREE.Mesh(
  new THREE.BoxGeometry(0.25, 0.8, 0.25),
  new THREE.MeshLambertMaterial({ color: 0x2266cc })
);
rArm.position.set(0.55, 1.25, 0);
rArm.castShadow = true;
playerGroup.add(rArm);

// Left leg
const lLeg = new THREE.Mesh(
  new THREE.BoxGeometry(0.3, 0.9, 0.3),

);
lLeg.position.set(-0.22, 0.45, 0);
lLeg.castShadow = true;
playerGroup.add(lLeg);

// Right leg
const rLeg = new THREE.Mesh(
  new THREE.BoxGeometry(0.3, 0.9, 0.3),

);

// Player glow ring

);
glowRing.rotation.x = -Math.PI/2;
glowRing.position.y = 0.05;
playerGroup.add(glowRing);

const player = { x:0, z:0, angle:0, speed:0.1, invincible:0, alive:true, walkTime:0 };
playerGroup.position.set(0, 0, 0);
</script>

<script>
// ═══════════════════════════════════════════
//  ENEMY (3D demon character)
// ═══════════════════════════════════════════
const enemyGroup = new THREE.Group();
scene.add(enemyGroup);

// Body
const eBody = new THREE.Mesh(
  new THREE.BoxGeometry(1.0, 1.1, 0.6),
  new THREE.MeshLambertMaterial({ color: 0xcc2222 })
);
eBody.position.y = 1.35;
eBody.castShadow = true;
enemyGroup.add(eBody);

// Head
const eHead = new THREE.Mesh(
  new THREE.BoxGeometry(0.75, 0.75, 0.75),
  new THREE.MeshLambertMaterial({ color: 0xcc2222 })
);
eHead.position.y = 2.2;
eHead.castShadow = true;
enemyGroup.add(eHead);

// Horns
[[-0.22, 2.72, 0.1],[0.22, 2.72, 0.1]].forEach((p,i) => {
  const horn = new THREE.Mesh(
    new THREE.ConeGeometry(0.1, 0.5, 5),
    new THREE.MeshLambertMaterial({ color: 0xff6600 })
  );
  horn.position.set(p[0], p[1], p[2]);
  horn.rotation.z = i===0 ? -0.3 : 0.3;
  enemyGroup.add(horn);
});

// Eyes (glowing yellow)
[-0.2, 0.2].forEach(ex => {
  const eye = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 6, 6),
    new THREE.MeshBasicMaterial({ color: 0xffff00 })
  );
  eye.position.set(ex, 2.22, 0.38);
  enemyGroup.add(eye);
});

// Arms
[-0.7, 0.7].forEach((ex,i) => {
  const arm = new THREE.Mesh(
    new THREE.BoxGeometry(0.28, 0.9, 0.28),
    new THREE.MeshLambertMaterial({ color: 0xaa1111 })
  );
  arm.position.set(ex, 1.3, 0);
  arm.castShadow = true;
  enemyGroup.add(arm);
});

// Legs
[-0.25, 0.25].forEach(lx => {
  const leg = new THREE.Mesh(
    new THREE.BoxGeometry(0.32, 1.0, 0.32),
    new THREE.MeshLambertMaterial({ color: 0x880000 })
  );
  leg.position.set(lx, 0.5, 0);
  leg.castShadow = true;
  enemyGroup.add(leg);
});

// Enemy glow ring
const eRing = new THREE.Mesh(
  new THREE.RingGeometry(0.7, 1.0, 16),
  new THREE.MeshBasicMaterial({ color: 0xff2200, side: THREE.DoubleSide, transparent:true, opacity:0.5 })
);
eRing.rotation.x = -Math.PI/2;
eRing.position.y = 0.05;
enemyGroup.add(eRing);

const enemy = { x:15, z:-15, angle:0, shootTimer:0, shootInterval:110 };
enemyGroup.position.set(15, 0, -15);
</script>

<script>
// ═══════════════════════════════════════════
//  COLLECTIBLES (3D spinning gems)
// ═══════════════════════════════════════════
const gemColors = [0xffe066, 0x00ffcc, 0xff66ff, 0x66ffff, 0xff9966];
let collectibles = [];
let collectibleMeshes = [];

function spawnGem() {
  if (collectibles.length >= 6) return;
  const x = (Math.random()-0.5)*50;
  const z = (Math.random()-0.5)*50;
  const color = gemColors[Math.floor(Math.random()*gemColors.length)];
  const gem = new THREE.Group();
  // Diamond shape using octahedron
  const mesh = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.6, 0),
    new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity:0.4, shininess:100 })
  );
  mesh.castShadow = true;
  gem.add(mesh);
  // Glow ring around gem
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.7, 0.9, 12),
    new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent:true, opacity:0.4 })
  );
  ring.rotation.x = -Math.PI/2;
  gem.add(ring);
  gem.position.set(x, 1.2, z);
  scene.add(gem);
  collectibles.push({ x, z, mesh: gem, time: Math.random()*Math.PI*2 });
}

// Spawn 4 gems at start
for (let i = 0; i < 4; i++) spawnGem();

// ═══════════════════════════════════════════
//  PROJECTILES
// ═══════════════════════════════════════════
let projectiles = [];

function spawnProjectile() {
  const dx = player.x - enemy.x;
  const dz = player.z - enemy.z;
  const dist = Math.sqrt(dx*dx + dz*dz);
  if (dist === 0) return;
  const speed = 0.18;
  const proj = new THREE.Group();
  // Fireball core
  const ball = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xff4400 })
  );
  proj.add(ball);
  // Glow
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(0.5, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xff8800, transparent:true, opacity:0.35 })
  );
  proj.add(glow);
  proj.position.set(enemy.x + (dx/dist)*1.5, 1.5, enemy.z + (dz/dist)*1.5);
  scene.add(proj);
  projectiles.push({ mesh: proj, vx: (dx/dist)*speed, vz: (dz/dist)*speed, life: 300 });
}

// ═══════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════
let particles = [];
function spawnParticles(x, y, z, color) {
  for (let i = 0; i < 12; i++) {
    const p = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 4, 4),
      new THREE.MeshBasicMaterial({ color })
    );
    const angle = Math.random()*Math.PI*2;
    const speed = 0.05 + Math.random()*0.1;
    p.position.set(x, y, z);
    scene.add(p);
    particles.push({ mesh:p, vx:Math.cos(angle)*speed, vy:0.05+Math.random()*0.08, vz:Math.sin(angle)*speed, life:40 });
  }
}
</script>

<script>
// ═══════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════
const keys = {};
addEventListener('keydown', e => { keys[e.key]=true;  e.preventDefault(); });
addEventListener('keyup',   e => { keys[e.key]=false; });

// ═══════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════
let score = 0, lives = 5, gameRunning = false;
const SCORE_WIN = 10;
let spawnTimer  = 0;

function updateHUD() {
  document.getElementById('scoreText').textContent = `⭐ Score: ${score} / ${SCORE_WIN}`;
  let h = '';
  for (let i=0;i<lives;i++) h+='❤️';
  for (let i=lives;i<5;i++) h+='🖤';
  document.getElementById('livesText').textContent = h;
  document.getElementById('barFill').style.width = (score/SCORE_WIN*100)+'%';
}

function startGame() {
  score=0; lives=5; gameRunning=true;
  player.x=0; player.z=0; player.invincible=0; player.alive=true;
  enemy.x=15; enemy.z=-15; enemy.shootTimer=0;
  enemyGroup.position.set(15,0,-15);
  playerGroup.position.set(0,0,0);
  // Clear projectiles
  projectiles.forEach(p => scene.remove(p.mesh));
  projectiles=[];
  // Clear old gems
  collectibles.forEach(c => scene.remove(c.mesh));
  collectibles=[];
  particles.forEach(p => scene.remove(p.mesh));
  particles=[];
  for (let i=0;i<4;i++) spawnGem();
  spawnTimer=0;
  updateHUD();
  document.getElementById('overlay').style.display='none';
  animate();
}

function endGame(won) {
  gameRunning=false;
  const ol = document.getElementById('overlay');
  ol.innerHTML = won
    ? `<h1 style="color:#00ff88">🏆 YOU WIN!</h1>
       <p style="color:#ffe066;font-size:22px">Score: ${score} / ${SCORE_WIN}</p>
       <p style="color:#aaa">You collected all gems and survived!</p>
       <button onclick="startGame()">▶ Play Again</button>`
    : `<h1 style="color:#ff4444">💀 GAME OVER</h1>
       <p style="color:#ff8888;font-size:22px">Score: ${score} / ${SCORE_WIN}</p>
       <p style="color:#aaa">The enemy defeated you!</p>
       <button onclick="startGame()">▶ Try Again</button>`;
  ol.style.display='flex';
}
</script>

<script>
// ═══════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════
let animId2;
function animate() {
  if (!gameRunning) return;
  animId2 = requestAnimationFrame(animate);
  const t = Date.now()*0.001;

  // ── Player movement ──
  let dx=0, dz=0;
  if (keys['a']||keys['ArrowLeft'])  dx -= 1;
  if (keys['d']||keys['ArrowRight']) dx += 1;
  if (keys['w']||keys['ArrowUp'])    dz -= 1;
  if (keys['s']||keys['ArrowDown'])  dz += 1;
  const moving = dx!==0||dz!==0;
  if (moving) {
    const len = Math.sqrt(dx*dx+dz*dz);
    player.x += (dx/len)*player.speed;
    player.z += (dz/len)*player.speed;
    player.angle = Math.atan2(dx, dz);
    player.walkTime += 0.15;
  }
  // Clamp
  player.x = Math.max(-38, Math.min(38, player.x));
  player.z = Math.max(-38, Math.min(38, player.z));
  if (player.invincible>0) player.invincible--;

  // Player mesh update
  playerGroup.position.set(player.x, 0, player.z);
  playerGroup.rotation.y = player.angle;
  // Walk animation
  if (moving) {
    lLeg.position.y = 0.45 + Math.sin(player.walkTime)*0.2;
    rLeg.position.y = 0.45 - Math.sin(player.walkTime)*0.2;
    lArm.rotation.x =  Math.sin(player.walkTime)*0.4;
    rArm.rotation.x = -Math.sin(player.walkTime)*0.4;
  }
  // Invincible flash
  const flash = player.invincible>0 && Math.floor(player.invincible/7)%2===0;
  playerGroup.visible = !flash;
  // Glow ring pulse
  glowRing.scale.set(1+Math.sin(t*3)*0.1, 1, 1+Math.sin(t*3)*0.1);

  // ── Third Person Camera ──
  const camDist  = 10;
  const camHeight = 6;
  const camX = player.x - Math.sin(player.angle)*camDist;
  const camZ = player.z - Math.cos(player.angle)*camDist;
  camera.position.lerp(new THREE.Vector3(camX, camHeight, camZ), 0.1);
  camera.lookAt(player.x, 1.5, player.z);

  // ── Enemy faces player ──
  const edx = player.x - enemy.x;
  const edz = player.z - enemy.z;
  enemy.angle = Math.atan2(edx, edz);
  enemyGroup.rotation.y = enemy.angle;
  // Enemy idle bob
  enemyGroup.position.y = Math.sin(t*2)*0.1;
  eRing.scale.set(1+Math.sin(t*4)*0.15, 1, 1+Math.sin(t*4)*0.15);

  // ── Enemy shoot ──
  enemy.shootTimer++;
  if (enemy.shootTimer >= enemy.shootInterval) {
    enemy.shootTimer=0;
    spawnProjectile();
  }

  // ── Move projectiles ──
  for (let i=projectiles.length-1;i>=0;i--) {
    const p=projectiles[i];
    p.mesh.position.x += p.vx;
    p.mesh.position.z += p.vz;
    p.mesh.rotation.y += 0.1;
    p.life--;
    if (p.life<=0||Math.abs(p.mesh.position.x)>50||Math.abs(p.mesh.position.z)>50) {
      scene.remove(p.mesh); projectiles.splice(i,1); continue;
    }
    // Hit player
    if (player.invincible===0) {
      const hx=p.mesh.position.x-player.x, hz=p.mesh.position.z-player.z;
      if (Math.sqrt(hx*hx+hz*hz)<1.2) {
        scene.remove(p.mesh); projectiles.splice(i,1);
        player.invincible=90; lives--;
        spawnParticles(player.x,1.5,player.z,0xff4444);
        updateHUD();
        if (lives<=0) { endGame(false); return; }
      }
    }
  }

  // ── Gems ──
  spawnTimer++;
  if (spawnTimer>=180) { spawnTimer=0; spawnGem(); }
  for (let i=collectibles.length-1;i>=0;i--) {
    const c=collectibles[i];
    c.time+=0.03;
    c.mesh.rotation.y += 0.02;
    c.mesh.position.y = 1.2 + Math.sin(c.time)*0.3;
    const gx=c.mesh.position.x-player.x, gz=c.mesh.position.z-player.z;
    if (Math.sqrt(gx*gx+gz*gz)<1.5) {
      spawnParticles(c.mesh.position.x,1.2,c.mesh.position.z,0xffe066);
      scene.remove(c.mesh); collectibles.splice(i,1);
      score++; updateHUD();
      if (score>=SCORE_WIN) { endGame(true); return; }
    }
  }

  // ── Particles ──
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.mesh.position.x+=p.vx; p.mesh.position.y+=p.vy; p.mesh.position.z+=p.vz;
    p.vy-=0.003;
    p.life--;
    p.mesh.material.opacity = p.life/40;
    p.mesh.material.transparent=true;
    if (p.life<=0) { scene.remove(p.mesh); particles.splice(i,1); }
  }

  renderer.render(scene, camera);
}

// Initial render so something shows before start
renderer.render(scene, camera);
</script>
</body>
