<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enemy Shooter Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; }
  canvas { border: 2px solid #00ff88; display: block; }
  #ui { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 800px; pointer-events: none; }
  #overlay { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 800px; height: 600px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); color: white; font-size: 28px; z-index: 10; }
  #overlay h1 { font-size: 48px; margin-bottom: 20px; }
  #overlay p { font-size: 20px; margin: 8px 0; color: #aaa; }
  #overlay button { margin-top: 30px; padding: 14px 40px; font-size: 22px; background: #00ff88; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
  #overlay button:hover { background: #00cc66; }
  #winMsg { color: #00ff88; }
  #loseMsg { color: #ff4444; }
</style>
</head>
<body>

<div style="position:relative;">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div id="overlay">
    <h1 style="color:#00ff88;">🎮 Enemy Shooter</h1>
    <p>Move: <b>WASD / Arrow Keys</b></p>
    <p>Collect glowing gems to score points</p>
    <p>Avoid the enemy's red projectiles!</p>
    <p>Collect <b>10 gems</b> to WIN</p>
    <p>You have <b>5 lives</b> — don't get hit!</p>
    <button onclick="startGame()">▶ Start Game</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

// ─── Game State ───────────────────────────────────────────────
let gameRunning = false;
let score = 0;
let lives = 5;
let scoreToWin = 10;
let animId;

// ─── Player ───────────────────────────────────────────────────
const player = {
  x: 400, y: 300, r: 18, speed: 3.5,
  color: '#00ccff', invincible: 0
};

// ─── Enemy ────────────────────────────────────────────────────
const enemy = {
  x: 680, y: 80, r: 22,
  color: '#ff4444', angle: 0,
  shootTimer: 0, shootInterval: 120
};

// ─── Arrays ───────────────────────────────────────────────────
let projectiles = [];
let collectibles = [];
let particles   = [];

// ─── Input ────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup',   e => keys[e.key] = false);

// ─── Spawning ─────────────────────────────────────────────────
let spawnTimer = 0;
const spawnInterval = 180; // frames

function spawnCollectible() {
  if (collectibles.length >= 5) return;
  const margin = 40;
  collectibles.push({
    x: margin + Math.random() * (canvas.width  - margin * 2),
    y: margin + Math.random() * (canvas.height - margin * 2),
    r: 14, pulse: Math.random() * Math.PI * 2,
    color: `hsl(${Math.floor(Math.random()*360)},100%,60%)`
  });
}

// ─── Start ────────────────────────────────────────────────────
function startGame() {
  score = 0; lives = 5;
  projectiles = []; collectibles = []; particles = [];
  player.x = 400; player.y = 300; player.invincible = 0;
  enemy.x = 680;  enemy.y = 80;
  spawnTimer = 0;
  overlay.style.display = 'none';
  gameRunning = true;
  // spawn 3 collectibles immediately
  for (let i = 0; i < 3; i++) spawnCollectible();
  cancelAnimationFrame(animId);
  loop();
}

// ─── Main Loop ────────────────────────────────────────────────
function loop() {
  if (!gameRunning) return;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// ─── Update ───────────────────────────────────────────────────
function update() {

  // Player movement
  if (keys['a'] || keys['ArrowLeft'])  player.x -= player.speed;
  if (keys['d'] || keys['ArrowRight']) player.x += player.speed;
  if (keys['w'] || keys['ArrowUp'])    player.y -= player.speed;
  if (keys['s'] || keys['ArrowDown'])  player.y += player.speed;

  // Clamp player to canvas
  player.x = Math.max(player.r, Math.min(canvas.width  - player.r, player.x));
  player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));

  // Invincibility frames
  if (player.invincible > 0) player.invincible--;

  // ── Enemy faces player ──
  const dx = player.x - enemy.x;
  const dy = player.y - enemy.y;
  enemy.angle = Math.atan2(dy, dx);

  // ── Enemy shoots ──
  enemy.shootTimer++;
  if (enemy.shootTimer >= enemy.shootInterval) {
    enemy.shootTimer = 0;
    const speed = 3.8;
    const dist  = Math.sqrt(dx*dx + dy*dy);
    projectiles.push({
      x: enemy.x + Math.cos(enemy.angle) * (enemy.r + 5),
      y: enemy.y + Math.sin(enemy.angle) * (enemy.r + 5),
      vx: (dx / dist) * speed,
      vy: (dy / dist) * speed,
      r: 8, life: 220
    });
  }

  // ── Move projectiles ──
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    if (p.life <= 0 || p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
      projectiles.splice(i, 1); continue;
    }
    // Hit player
    if (player.invincible === 0 && dist2(p, player) < (p.r + player.r) * (p.r + player.r)) {
      projectiles.splice(i, 1);
      player.invincible = 90;
      lives--;
      spawnParticles(player.x, player.y, '#ff4444');
      if (lives <= 0) { endGame(false); return; }
    }
  }

  // ── Spawn collectibles ──
  spawnTimer++;
  if (spawnTimer >= spawnInterval) { spawnTimer = 0; spawnCollectible(); }

  // ── Pulse collectibles + check collect ──
  for (let i = collectibles.length - 1; i >= 0; i--) {
    const c = collectibles[i];
    c.pulse += 0.07;
    if (dist2(c, player) < (c.r + player.r) * (c.r + player.r)) {
      collectibles.splice(i, 1);
      score++;
      spawnParticles(c.x, c.y, '#ffff00');
      if (score >= scoreToWin) { endGame(true); return; }
    }
  }

  // ── Particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    p.vx *= 0.95; p.vy *= 0.95;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─── Draw ─────────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
  for (let y = 0; y < canvas.height; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }

  // ── Collectibles ──
  collectibles.forEach(c => {
    const s = 1 + Math.sin(c.pulse) * 0.25;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(s, s);
    // Glow
    ctx.shadowColor = c.color;
    ctx.shadowBlur  = 18;
    ctx.fillStyle   = c.color;
    // Draw gem (diamond shape)
    ctx.beginPath();
    ctx.moveTo(0, -c.r);
    ctx.lineTo(c.r * 0.7, 0);
    ctx.lineTo(0, c.r);
    ctx.lineTo(-c.r * 0.7, 0);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  });

  // ── Particles ──
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // ── Projectiles ──
  projectiles.forEach(p => {
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur  = 12;
    ctx.fillStyle   = '#ff6666';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // ── Enemy ──
  ctx.save();
  ctx.translate(enemy.x, enemy.y);
  ctx.rotate(enemy.angle);
  // Body
  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur  = 20;
  ctx.fillStyle   = '#cc2222';
  ctx.beginPath();
  ctx.arc(0, 0, enemy.r, 0, Math.PI * 2);
  ctx.fill();
  // Eye (direction indicator)
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(enemy.r * 0.5, 0, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(enemy.r * 0.6, 0, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();

  // ── Player ──
  ctx.save();
  ctx.translate(player.x, player.y);
  // Invincibility flicker
  if (player.invincible > 0 && Math.floor(player.invincible / 6) % 2 === 0) {
    ctx.globalAlpha = 0.3;
  }
  ctx.shadowColor = '#00ccff';
  ctx.shadowBlur  = 20;
  ctx.fillStyle   = '#00ccff';
  ctx.beginPath();
  ctx.arc(0, 0, player.r, 0, Math.PI * 2);
  ctx.fill();
  // Inner circle
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(0, 0, player.r * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur  = 0;
  ctx.globalAlpha = 1;
  ctx.restore();

  // ── HUD ──
  // Score
  ctx.fillStyle = '#ffffff';
  ctx.font      = 'bold 22px Arial';
  ctx.fillText(`Score: ${score} / ${scoreToWin}`, 16, 32);

  // Lives (hearts)
  ctx.font = '22px Arial';
  let heartsText = '';
  for (let i = 0; i < lives; i++) heartsText += '❤️ ';
  ctx.fillText(heartsText, 16, 62);

  // Enemy label
  ctx.fillStyle = '#ff6666';
  ctx.font      = 'bold 13px Arial';
  ctx.fillText('ENEMY', enemy.x - 22, enemy.y - enemy.r - 8);

  // Score bar
  const barW = 200;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(canvas.width - barW - 16, 14, barW, 16);
  ctx.fillStyle = '#00ff88';
  ctx.fillRect(canvas.width - barW - 16, 14, barW * (score / scoreToWin), 16);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth   = 1;
  ctx.strokeRect(canvas.width - barW - 16, 14, barW, 16);
  ctx.fillStyle = '#fff';
  ctx.font      = '12px Arial';
  ctx.fillText('Progress', canvas.width - barW - 16, 46);
}

// ─── End Game ─────────────────────────────────────────────────
function endGame(won) {
  gameRunning = false;
  cancelAnimationFrame(animId);
  overlay.innerHTML = won
    ? `<h1 id="winMsg">🏆 YOU WIN!</h1>
       <p style="color:#00ff88;font-size:24px;">Score: ${score} / ${scoreToWin}</p>
       <p style="color:#aaa;">You survived and collected all gems!</p>
       <button onclick="startGame()">▶ Play Again</button>`
    : `<h1 id="loseMsg">💀 GAME OVER</h1>
       <p style="color:#ff4444;font-size:24px;">Score: ${score} / ${scoreToWin}</p>
       <p style="color:#aaa;">You were hit too many times!</p>
       <button onclick="startGame()">▶ Try Again</button>`;
  overlay.style.display = 'flex';
}

// ─── Helpers ──────────────────────────────────────────────────
function dist2(a, b) { return (a.x-b.x)**2 + (a.y-b.y)**2; }

function spawnParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y, r: 3 + Math.random() * 3,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color, life: 40, maxLife: 40
    });
  }
}
</script>
</body>
</html>
